<!DOCTYPE html>
<html>
<head>
  <title>Iframe de Loyalty</title>
</head>
<body>
  <h1>Loyalty Module (iframe)</h1>
  <p id="status">Waiting for token...</p>
  <script>
    window.addEventListener('message', (event) => {
      if (event.origin !== 'http://127.0.0.1:8080') {
        console.warn('Origen no autorizado:', event.origin);
        return;
      }

      const { type, token } = event.data;
      if (type === 'AUTH_TOKEN') {
        console.log('✅ Token recibido correctamente:', token);
        document.body.innerHTML += `<p>Token received:<br><code>${token}</code></p>`;
        document.getElementById('status').textContent = `Token received: ${token}`;

      }
    });
    //Simulate token expiration in 5 seconds
    setTimeout(() => {
      console.log('[iframe] Requesting token refresh');
      document.getElementById('status').textContent = `Token expired. Requesting refresh...`;
      window.parent.postMessage({ type: 'REQUEST_NEW_TOKEN' }, '*');
    }, 5000);
  </script>
</body>
</html>
