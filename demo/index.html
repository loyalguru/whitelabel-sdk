<!DOCTYPE html>
<html>
<head>
  <title>Test SDK</title>
  <script src="https://storage.googleapis.com/cdn-streaming-west/sdk/embed-sdk.umd.js"></script>
  <script src="config.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin:0">
  <div id="loyalty-container"></div>

  <script>
    const config = window.EMBED_SDK_CONFIG || {};

    EmbedLoyaltyApp.init({
      containerId: 'loyalty-container',
      module: '', //home | rewards | challenges | accounts
      iframeOrigin: config.iframeOrigin,
      token: config.token,
      locale: config.locale,
      autoResize: config.autoResize, //For mobile apps set on false
      onLoad: () => console.log('[host] Iframe loaded'),
      onSize: ({ height }) => console.log('[host] iframe height:', height),
      onError: (err) => console.error('[SDK] error', err),
      onServerError: (serverError) => console.warn('[SDK] server error', serverError)
    });

    EmbedLoyaltyApp.onTokenRefreshRequested(async () => {
      const newToken = config.token;
      EmbedLoyaltyApp.refreshToken(newToken);
    });
    EmbedLoyaltyApp.onSizeRequested(({ height, width }) => {});
  </script>
</body>
</html>
